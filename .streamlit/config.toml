# VitaLex AI - Streamlit configuration.
#
# Forces a consistent light theme regardless of the visitor's OS/browser
# dark-mode preference. Without this, Streamlit's native widgets (metrics,
# alerts, captions, text areas, etc.) can render light/white text that
# becomes invisible against the app's light custom background.
[theme]
base = "light"
primaryColor = "#0EA5A5"
backgroundColor = "#F5F7FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#0F172A"
font = "sans serif"

[browser]
gatherUsageStats = false
